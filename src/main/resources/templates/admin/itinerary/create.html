<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin - Thêm Ngày Lịch Trình</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-0">
                <div class="card-header bg-success text-white p-3">
                    <h5 class="mb-0"><i class="fa-solid fa-calendar-plus me-2"></i>Thêm Mới Ngày Lịch Trình</h5>
                </div>
                <div class="card-body p-4">
                    
                    <form th:action="@{/admin/itineraries/tour/{tourId}/create(tourId=${tourId})}" th:object="${itinerary}" method="POST">
                        
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="dayNumber" class="form-label fw-bold">Số thứ tự ngày</label>
                                <input type="number" th:field="*{dayNumber}" id="dayNumber" class="form-control" placeholder="Ví dụ: 1, 2, 3" min="1" required>
                            </div>
                            <div class="col-md-8 mb-3">
                                <label for="title" class="form-label fw-bold">Tiêu đề ngày đi</label>
                                <input type="text" th:field="*{title}" id="title" class="form-control" placeholder="Ví dụ: Đón sân bay Cam Ranh - Nhận phòng khách sạn" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="imageUrl" class="form-label fw-bold">Ảnh minh họa riêng cho ngày này (URL)</label>
                            <input type="url" th:field="*{imageUrl}" id="imageUrl" class="form-control" placeholder="https://example.com/anh-ngay-1.jpg">
                        </div>

                        <div class="mb-4">
                            <label for="content" class="form-label fw-bold">Nội dung / Hoạt động chi tiết trong ngày</label>
                            <textarea th:field="*{content}" id="content" class="form-control" rows="6" placeholder="Nhập các mốc thời gian, điểm tham quan, các bữa ăn có bao gồm trong ngày..." required></textarea>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <a th:href="@{/admin/itineraries/tour/{id}(id=${tourId})}" class="btn btn-secondary px-4">Hủy bỏ</a>
                            <button type="submit" class="btn btn-success px-4">Lưu dữ liệu</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
