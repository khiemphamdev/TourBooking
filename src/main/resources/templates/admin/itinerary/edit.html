<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin - Sửa Lịch Trình</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-0">
                <div class="card-header bg-warning text-dark p-3">
                    <h5 class="mb-0 fw-bold"><i class="fa-solid fa-calendar-check me-2"></i>Chỉnh Sửa Ngày Lịch Trình</h5>
                </div>
                <div class="card-body p-4">
                    
                    <form th:action="@{/admin/itineraries/edit/{id}(id=${itinerary.id})}" th:object="${itinerary}" method="POST">
                        
                        <input type="hidden" th:field="*{id}">

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="dayNumber" class="form-label fw-bold">Số thứ tự ngày</label>
                                <input type="number" th:field="*{dayNumber}" id="dayNumber" class="form-control" min="1" required>
                            </div>
                            <div class="col-md-8 mb-3">
                                <label for="title" class="form-label fw-bold">Tiêu đề ngày đi</label>
                                <input type="text" th:field="*{title}" id="title" class="form-control" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="imageUrl" class="form-label fw-bold">Đường dẫn ảnh minh họa (URL)</label>
                            <input type="url" th:field="*{imageUrl}" id="imageUrl" class="form-control">
                        </div>

                        <div class="mb-4">
                            <label for="content" class="form-label fw-bold">Nội dung hoạt động chi tiết</label>
                            <textarea th:field="*{content}" id="content" class="form-control" rows="6" required></textarea>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <a th:href="@{/admin/itineraries/tour/{id}(id=${itinerary.tour.id})}" class="btn btn-secondary px-4">Hủy</a>
                            <button type="submit" class="btn btn-warning text-dark fw-bold px-4">Cập nhật</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
