<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Lịch trình Tour</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #212529; color: white; }
        .sidebar .nav-link { color: #adb5bd; }
        .sidebar .nav-link.active { color: white; background-color: #495057; border-radius: 4px; }
        
        /* CẤU HÌNH CARD ĐỒNG ĐỀU CHIỀU CAO */
        .iti-card { 
            border-radius: 10px; 
            border: none; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.04); 
            transition: 0.3s;
            height: 240px; /* Chiều cao cố định chuẩn cho toàn bộ các card trên PC */
            overflow: hidden;
        }
        .iti-card:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.08); }
        
        /* Khi bấm 'Xem thêm', card sẽ tự bung chiều cao tự do */
        .iti-card.expanded {
            height: auto !important;
        }

        /* ẢNH KHỚP KHUNG HOÀN TOÀN */
        .iti-img-container {
            height: 100%;
        }
        .iti-img { 
            object-fit: cover; 
            width: 100%; 
            height: 100%; 
            border-radius: 8px 0 0 8px; 
        }
        
        /* GIỚI HẠN VÙNG CHỮ */
        .content-container {
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        
        /* Mặc định text chỉ hiển thị tối đa 3 dòng, vượt quá sẽ bị ẩn khuất */
        .iti-content-text {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;  
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* Khi nhấn Xem thêm, hiển thị toàn bộ dòng chữ */
        .iti-card.expanded .iti-content-text {
            display: block !important;
            -webkit-line-clamp: unset !important;
        }

        /* Nút xem thêm */
        .btn-toggle-text {
            padding: 0;
            font-size: 0.85rem;
            color: #0d6efd;
            text-decoration: none;
            font-weight: 500;
            display: none; /* Mặc định ẩn, JS sẽ bật lên nếu chữ bị tràn */
        }
        .btn-toggle-text:hover { text-decoration: underline; }

        /* ĐÁP ỨNG TRÊN MOBILE */
        @media (max-width: 768px) { 
            .iti-card { height: auto !important; } /* Trên mobile để tự giãn dòng */
            .iti-img { border-radius: 8px 8px 0 0; height: 180px; } 
            .iti-img-container { height: auto; }
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse p-3">
            <h4 class="text-center py-3 text-primary"><i class="fa-solid fa-plane-departure me-2"></i>TourAdmin</h4>
            <hr>
            <ul class="nav flex-column gap-2">
                <li><a class="nav-link" th:href="@{/admin/locations}"><i class="fa-solid fa-map-location-dot me-2"></i>Địa điểm</a></li>
                <li><a class="nav-link active" th:href="@{/admin/tours}"><i class="fa-solid fa-suitcases me-2"></i>Quản lý Tour</a></li>
                <li><a class="nav-link" th:href="@{/admin/bookings}"><i class="fa-solid fa-receipt me-2"></i>Đơn đặt tour</a></li>
            </ul>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            <div class="mb-3">
                <a th:href="@{/admin/tours}" class="btn btn-sm btn-outline-secondary"><i class="fa-solid fa-arrow-left me-1"></i> Quay lại quản lý Tour</a>
            </div>

            <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-4">
                <div>
                    <h2 class="mb-1">Lịch trình chi tiết từng ngày</h2>
                    <p class="text-muted mb-0">Tour: <strong class="text-dark" th:text="${tour.title}">Tên Tour mẫu</strong></p>
                </div>
                <a th:href="@{/admin/itineraries/tour/{id}/create(id=${tour.id})}" class="btn btn-success">
                    <i class="fa-solid fa-plus me-2"></i>Thêm ngày lịch trình
                </a>
            </div>

            <div class="row g-4">
                <div class="col-12" th:each="iti : ${itineraries}">
                    <div class="card iti-card bg-white">
                        <div class="row g-0 h-100">
                            <div class="col-md-3 iti-img-container">
                                <img th:src="${iti.imageUrl != null ? iti.imageUrl : 'https://via.placeholder.com/400x300'}" 
                                     class="iti-img" alt="Ảnh lịch trình ngày">
                            </div>
                            <div class="col-md-9 p-4 d-flex flex-column h-100">
                                <div class="d-flex justify-content-between align-items-start mb-2 flex-shrink-0">
                                    <h5 class="card-title fw-bold text-dark mb-0">
                                        <span class="badge bg-primary me-2">Ngày [[${iti.dayNumber}]]</span>
                                        <span th:text="${iti.title}">Tiêu đề lịch trình</span>
                                    </h5>
                                    <div class="btn-group btn-group-sm">
                                        <a th:href="@{/admin/itineraries/edit/{id}(id=${iti.id})}" class="btn btn-outline-warning text-dark">
                                            <i class="fa-solid fa-pen-to-square me-1"></i>Sửa
                                        </a>
                                        <a th:href="@{/admin/itineraries/delete/{id}(id=${iti.id})}" 
                                           class="btn btn-outline-danger"
                                           onclick="return confirm('Xác nhận xóa ngày lịch trình này?')">
                                            <i class="fa-solid fa-trash-can"></i> Xóa
                                        </a>
                                    </div>
                                </div>
                                
                                <div class="content-container d-flex flex-column justify-content-between">
                                    <p class="card-text text-muted iti-content-text mb-2" 
                                       style="white-space: pre-line;" 
                                       th:text="${iti.content}">Nội dung hoạt động...</p>
                                    
                                    <div>
                                        <button type="button" class="btn btn-link btn-toggle-text" onclick="toggleText(this)">
                                            Xem thêm <i class="fa-solid fa-chevron-down ms-1"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-12 text-center py-5 text-muted bg-white border rounded shadow-sm" th:if="${#lists.isEmpty(itineraries)}">
                    <i class="fa-solid fa-calendar-xmark fa-2x mb-3 text-secondary"></i>
                    <p class="mb-0">Tour này chưa được cập nhật lịch trình cụ thể từng ngày.</p>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        // Quét qua toàn bộ các khối chữ nội dung trên trang
        const textBlocks = document.querySelectorAll('.iti-content-text');
        
        textBlocks.forEach(block => {
            // Nếu chiều cao thực tế của đoạn chữ lớn hơn không gian hiển thị (bị tràn dòng)
            if (block.scrollHeight > block.clientHeight) {
                // Tìm đến nút "Xem thêm" cùng cấp card và cho hiển thị nó lên
                const card = block.closest('.iti-card');
                const toggleBtn = card.querySelector('.btn-toggle-text');
                if (toggleBtn) {
                    toggleBtn.style.display = 'inline-block';
                }
            }
        });
    });

    function toggleText(button) {
        const card = button.closest('.iti-card');
        
        if (card.classList.contains('expanded')) {
            // Nếu đang mở rộng -> Thực hiện thu gọn lại
            card.classList.remove('expanded');
            button.innerHTML = 'Xem thêm <i class="fa-solid fa-chevron-down ms-1"></i>';
        } else {
            // Nếu đang thu gọn -> Mở rộng để xem toàn bộ chữ
            card.classList.add('expanded');
            button.innerHTML = 'Thu gọn <i class="fa-solid fa-chevron-up ms-1"></i>';
        }
    }
</script>
</body>
</html>
