<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin - Thêm Địa Điểm Mới</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-header bg-primary text-white p-3">
                    <h5 class="mb-0"><i class="fa-solid fa-map-location-dot me-2"></i>Thêm Mới Địa Điểm</h5>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/admin/locations/create}" th:object="${location}" method="POST">
                        
                        <div class="mb-3">
                            <label for="name" class="form-label fw-bold">Tên địa điểm / Thành phố</label>
                            <input type="text" th:field="*{name}" id="name" class="form-control" placeholder="Ví dụ: Nha Trang, Đà Lạt, Phú Quốc..." required>
                        </div>

                        <div class="mb-4">
                            <label for="description" class="form-label fw-bold">Mô tả tổng quan địa điểm</label>
                            <textarea th:field="*{description}" id="description" class="form-control" rows="5" placeholder="Nhập một vài nét nổi bật về địa điểm du lịch này..."></textarea>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <a th:href="@{/admin/locations}" class="btn btn-secondary px-4">Hủy bỏ</a>
                            <button type="submit" class="btn btn-success px-4">Lưu lại</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
