<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin - Cập Nhật Địa Điểm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-header bg-warning text-dark p-3">
                    <h5 class="mb-0 fw-bold"><i class="fa-solid fa-pen-to-square me-2"></i>Cập Nhật Thông Tin Địa Điểm</h5>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/admin/locations/edit/{id}(id=${location.id})}" th:object="${location}" method="POST">
                        
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label for="name" class="form-label fw-bold">Tên địa điểm / Thành phố</label>
                            <input type="text" th:field="*{name}" id="name" class="form-control" placeholder="Nhập tên địa điểm..." required>
                        </div>

                        <div class="mb-4">
                            <label for="description" class="form-label fw-bold">Mô tả tổng quan</label>
                            <textarea th:field="*{description}" id="description" class="form-control" rows="5" placeholder="Nhập mô tả cập nhật..."></textarea>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <a th:href="@{/admin/locations}" class="btn btn-secondary px-4">Hủy</a>
                            <button type="submit" class="btn btn-warning text-dark fw-bold px-4">Cập nhật</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
