<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Quản lý Địa điểm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #212529; color: white; }
        .sidebar .nav-link { color: #adb5bd; transition: 0.3s; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: white; background-color: #495057; border-radius: 4px; }
        .card-table { border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse p-3">
            <div class="position-sticky">
                <h4 class="text-center py-3 text-primary"><i class="fa-solid fa-plane-departure me-2"></i>TourAdmin</h4>
                <hr>
                <ul class="nav flex-column gap-2">
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/admin/locations}"><i class="fa-solid fa-map-location-dot me-2"></i>Địa điểm</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin/tours}"><i class="fa-solid fa-suitcases me-2"></i>Quản lý Tour</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin/bookings}"><i class="fa-solid fa-receipt me-2"></i>Đơn đặt tour</a>
                    </li>
                </ul>
                <hr>
                <div class="text-center text-muted small mt-5">Chào Admin!</div>
            </div>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">Quản lý Danh mục Địa điểm</h1>
                <a th:href="@{/admin/locations/create}" class="btn btn-primary"><i class="fa-solid fa-plus me-2"></i>Thêm địa điểm mới</a>
            </div>

            <div class="card card-table bg-white p-4">
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th style="width: 10%">Mã số</th>
                                <th style="width: 30%">Tên địa điểm</th>
                                <th style="width: 45%">Mô tả chi tiết</th>
                                <th style="width: 15%" class="text-end">Hành động</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="loc : ${locations}">
                                <td th:text="${loc.id}" class="fw-bold">1</td>
                                <td>
                                    <div class="fw-bold text-dark"><i class="fa-solid fa-location-dot text-danger me-2"></i>[[${loc.name}]]</div>
                                </td>
                                <td th:text="${loc.description != null && !loc.description.isEmpty() ? loc.description : 'Chưa có mô tả cho địa điểm này.'}" class="text-muted">Mô tả địa điểm...</td>
                                <td class="text-end">
                                    <div class="btn-group btn-group-sm">
                                        <a th:href="@{/admin/locations/edit/{id}(id=${loc.id})}" class="btn btn-outline-warning text-warning" title="Chỉnh sửa">
                                            <i class="fa-solid fa-pen-to-square"></i> Sửa
                                        </a>
                                        <a th:href="@{/admin/locations/delete/{id}(id=${loc.id})}" 
                                           class="btn btn-outline-danger text-danger" 
                                           onclick="return confirm('Lưu ý: Xóa địa điểm này có thể ảnh hưởng đến các Tour đang liên kết. Bạn vẫn muốn xóa chứ?')" 
                                           title="Xóa địa điểm">
                                            <i class="fa-solid fa-trash"></i> Xóa
                                        </a>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(locations)}">
                                <td colspan="4" class="text-center py-4 text-muted">Hệ thống chưa ghi nhận địa điểm nào.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
