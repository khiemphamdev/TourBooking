<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin - Lên Lịch Khởi Hành</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-header bg-warning text-dark p-3">
                    <h5 class="mb-0 fw-bold"><i class="fa-solid fa-clock-column-history me-2"></i>Lên Lịch Khởi Hành Mới</h5>
                </div>
                <div class="card-body p-4">
                    
                    <form th:action="@{/admin/schedules/tour/{tourId}/create(tourId=${tourId})}" th:object="${schedule}" method="POST">
                        
                        <div class="mb-3">
                            <label for="departureDate" class="form-label fw-bold">Chọn ngày khởi hành</label>
                            <input type="date" th:field="*{departureDate}" id="departureDate" class="form-control" required>
                            <div class="form-text text-muted">Lưu ý: Không chọn các ngày đã nằm trong quá khứ.</div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="availableSeats" class="form-label fw-bold">Số lượng chỗ mở bán</label>
                                <input type="number" th:field="*{availableSeats}" id="availableSeats" class="form-control" placeholder="Ví dụ: 30" min="1" required>
                            </div>
                            <div class="col-md-6 mb-3">
    <label for="price" class="form-label fw-bold">Giá vé áp dụng (VNĐ)</label>
    <input type="number" th:field="*{price}" id="price" class="form-control" placeholder="Ví dụ: 3200000" min="0" readonly>
   
</div>
                            
                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <a th:href="@{/admin/schedules/tour/{id}(id=${tourId})}" class="btn btn-secondary px-4">Hủy bỏ</a>
                            <button type="submit" class="btn btn-warning text-dark fw-bold px-4">Lưu lịch đi</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
