<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin - Tạo Tour Mới</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-0">
                <div class="card-header bg-primary text-white p-3">
                    <h5 class="mb-0"><i class="fa-solid fa-map-marked-alt me-2"></i>Thêm Mới Tour Du Lịch</h5>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/admin/tours/create}" th:object="${tour}" method="POST">
                        
                        <div class="mb-3">
                            <label for="title" class="form-label fw-bold">Tiêu đề / Tên Tour</label>
                            <input type="text" th:field="*{title}" id="title" class="form-control" placeholder="Nhập tên tour du lịch..." required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="departure" class="form-label fw-bold">Điểm khởi hành (Điểm đi)</label>
                                <select name="departureLocationId" id="departure" class="form-select" required>
                                    <option value="" disabled selected>Chọn điểm đi...</option>
                                    <option th:each="loc : ${locations}" th:value="${loc.id}" th:text="${loc.name}"></option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="destination" class="form-label fw-bold">Điểm đến</label>
                                <select name="destinationLocationId" id="destination" class="form-select" required>
                                    <option value="" disabled selected>Chọn điểm đến...</option>
                                    <option th:each="loc : ${locations}" th:value="${loc.id}" th:text="${loc.name}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="basePrice" class="form-label fw-bold">Giá gốc (VNĐ)</label>
                                <input type="number" th:field="*{basePrice}" id="basePrice" class="form-control" placeholder="Ví dụ: 3500000" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="imageUrl" class="form-label fw-bold">Đường dẫn hình ảnh (URL)</label>
                                <input type="url" th:field="*{imageUrl}" id="imageUrl" class="form-control" placeholder="https://example.com/anh-tour.jpg">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="description" class="form-label fw-bold">Mô tả chi tiết tổng quan</label>
                            <textarea th:field="*{description}" id="description" class="form-control" rows="5" placeholder="Nhập giới thiệu ngắn về hành trình tour..."></textarea>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <a th:href="@{/admin/tours}" class="btn btn-secondary px-4">Hủy bỏ</a>
                            <button type="submit" class="btn btn-success px-4">Lưu lại</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
