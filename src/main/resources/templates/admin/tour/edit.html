<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin - Cập Nhật Tour</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-0">
                <div class="card-header bg-warning text-dark p-3">
                    <h5 class="mb-0 fw-bold"><i class="fa-solid fa-pen-to-square me-2"></i>Chỉnh Sửa Thông Tin Tour</h5>
                </div>
                <div class="card-body p-4">
                    
                    <form th:action="@{/admin/tours/edit/{id}(id=${tour.id})}" th:object="${tour}" method="POST">
                        
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label for="title" class="form-label fw-bold">Tiêu đề / Tên Tour</label>
                            <input type="text" th:field="*{title}" id="title" class="form-control" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="departure" class="form-label fw-bold">Điểm khởi hành (Điểm đi)</label>
                                <select name="departureLocationId" id="departure" class="form-select" required>
                                    <option th:each="loc : ${locations}" 
                                            th:value="${loc.id}" 
                                            th:text="${loc.name}"
                                            th:selected="${loc.id == tour.departureLocation.id}"></option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="destination" class="form-label fw-bold">Điểm đến</label>
                                <select name="destinationLocationId" id="destination" class="form-select" required>
                                    <option th:each="loc : ${locations}" 
                                            th:value="${loc.id}" 
                                            th:text="${loc.name}"
                                            th:selected="${loc.id == tour.destinationLocation.id}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="basePrice" class="form-label fw-bold">Giá gốc (VNĐ)</label>
                                <input type="number" th:field="*{basePrice}" id="basePrice" class="form-control" min="0" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="imageUrl" class="form-label fw-bold">Đường dẫn hình ảnh (URL)</label>
                                <input type="url" th:field="*{imageUrl}" id="imageUrl" class="form-control">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="description" class="form-label fw-bold">Mô tả tổng quan hành trình</label>
                            <textarea th:field="*{description}" id="description" class="form-control" rows="6"></textarea>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <a th:href="@{/admin/tours}" class="btn btn-secondary px-4">Hủy bỏ</a>
                            <button type="submit" class="btn btn-warning text-dark fw-bold px-4">Cập nhật dữ liệu</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
