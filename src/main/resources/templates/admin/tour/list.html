<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Quản lý Tour</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #212529; color: white; }
        .sidebar .nav-link { color: #adb5bd; transition: 0.3s; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: white; background-color: #495057; border-radius: 4px; }
        .card-table { border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .tour-img { object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse p-3">
            <div class="position-sticky">
                <h4 class="text-center py-3 text-primary"><i class="fa-solid fa-plane-departure me-2"></i>TourAdmin</h4>
                <hr>
                <ul class="nav flex-column gap-2">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin/locations}"><i class="fa-solid fa-map-location-dot me-2"></i>Địa điểm</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/admin/tours}"><i class="fa-solid fa-suitcases me-2"></i>Quản lý Tour</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin/bookings}"><i class="fa-solid fa-receipt me-2"></i>Đơn đặt tour</a>
                    </li>
                </ul>
                <hr>
                <div class="text-center text-muted small mt-5">Chào Admin, Khiêm!</div>
            </div>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">Danh sách Tour Du lịch</h1>
                <a th:href="@{/admin/tours/create}" class="btn btn-primary"><i class="fa-solid fa-plus me-2"></i>Thêm Tour mới</a>
            </div>

            <div class="card card-table bg-white p-4">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Mã</th>
                                <th>Ảnh</th>
                                <th>Tên Tour</th>
                                <th>Điểm đi / Đến</th>
                                <th>Giá gốc</th>
                                <th class="text-center">Quản lý phụ</th>
                                <th class="text-end">Hành động</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="t : ${tours}">
                                <td th:text="${t.id}" class="fw-bold">1</td>
                                <td>
                                    <img th:src="${t.imageUrl != null ? t.imageUrl : 'https://via.placeholder.com/120x80'}" 
                                         width="90" height="60" class="tour-img" alt="Tour Thumbnail">
                                </td>
                                <td>
                                    <div class="fw-bold" th:text="${t.title}">Tour Nha Trang</div>
                                    <small class="text-muted" th:text="${#strings.abbreviate(t.description, 60)}">Mô tả...</small>
                                </td>
                                <td>
                                    <span class="badge bg-secondary" th:text="${t.departureLocation.name}">Hà Nội</span>
                                    <i class="fa-solid fa-arrow-right mx-1 text-muted small"></i>
                                    <span class="badge bg-success" th:text="${t.destinationLocation.name}">Nha Trang</span>
                                </td>
                                <td class="text-primary fw-bold" th:text="${#numbers.formatDecimal(t.basePrice, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</td>
                                <td class="text-center">
                                    <a th:href="@{/admin/itineraries/tour/{id}(id=${t.id})}" class="btn btn-outline-info btn-sm me-1">
                                        <i class="fa-solid fa-calendar-days me-1"></i>Lịch trình
                                    </a>
                                    <a th:href="@{/admin/schedules/tour/{id}(id=${t.id})}" class="btn btn-outline-warning btn-sm">
                                        <i class="fa-solid fa-clock me-1"></i>Ngày đi
                                    </a>
                                </td>
                                <td class="text-end">
                                <a th:href="@{/admin/tours/edit/{id}(id=${t.id})}" class="btn btn-sm btn-outline-warning text-dark me-1">
        <i class="fa-solid fa-pen-to-square"></i> Sửa
    </a>
                                    <a th:href="@{/admin/tours/delete/{id}(id=${t.id})}" 
                                       class="btn btn-soft-danger btn-sm text-danger" 
                                       onclick="return confirm('Bạn có chắc chắn muốn xóa tour này kèm tất cả dữ liệu lịch trình?')">
                                        <i class="fa-solid fa-trash-can"></i> Xóa
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(tours)}">
                                <td colspan="7" class="text-center py-4 text-muted">Chưa có tour nào trong hệ thống. Hãy thêm mới!</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
